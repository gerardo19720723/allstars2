services:
  postgres:
    image: postgres:15-alpine
    container_name: allstars-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: allstars2_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: allstars-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
